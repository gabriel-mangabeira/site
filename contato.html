    <script>
        function validarFormulario() {
            let nome = document.getElementById("nome").value;
            let email = document.getElementById("email").value;
            let mensagem = document.getElementById("mensagem").value;

            if (nome === "" || email === "" || mensagem === "") {
                alert("⚠️ Por favor, preencha todos os campos antes de enviar!");
                return false;
            }

            alert("✅ Formulário enviado com sucesso!");
            return true;
        }
    </script>

<main>

    <section>
        <h2>Entre em Contato</h2>
        <p>Preencha o formulário abaixo para enviar sua mensagem.</p>
    </section>

    <section>
        <form onsubmit="return validarFormulario()">

            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" placeholder="Digite seu nome"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" placeholder="Digite seu email"><br><br>

            <label for="esporte">Esporte favorito:</label><br>
            <select id="esporte">
                <option value="">Selecione</option>
                <option>Futebol</option>
                <option>Basquete</option>
                <option>Vôlei</option>
                <option>Lutas</option>
                <option>Xadrez</option>
                <option>Cavaleiros</option>
                <option>Arco e Flecha</option>
            </select><br><br>

            <label for="mensagem">Mensagem:</label><br>
            <textarea id="mensagem" rows="5" placeholder="Digite sua mensagem"></textarea><br><br>

            <input type="submit" value="Enviar">

        </form>
    </section>

</main>
